<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>EchoReply</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="pop">
      <header class="pop-header">
        <span class="pop-logo">✦</span>
        <div class="pop-title">
          <h1>EchoReply</h1>
          <p class="pop-tagline" data-i18n="optionsTagline">Understand the email. Then reply.</p>
        </div>
      </header>

      <p class="pop-body" data-i18n="popupBody">
        EchoReply adds an AI sidebar to Gmail. Set your Claude or OpenAI key in Settings, then open any email in Gmail.
      </p>

      <div class="pop-actions">
        <button id="open-settings" type="button" class="pop-btn pop-btn-primary" data-i18n="openSettings">
          Open Settings
        </button>
        <button id="open-gmail" type="button" class="pop-btn pop-btn-ghost" data-i18n="popupOpenGmail">
          Open Gmail
        </button>
      </div>

      <footer class="pop-footer">
        <span class="muted" data-i18n="optionsFooterMuted">v1.0.0 · API keys never leave your browser</span>
      </footer>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
